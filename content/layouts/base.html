<!DOCTYPE html>
<html lang="en" class="h-full" style="overflow-y: scroll;">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>[[title]][[siteName]]</title>
        [[cssHref]] [[jsSrc]]
        [[pageHead]]
        <script>
        window.onReady = function(fn) {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', fn);
            } else {
                fn();
            }
        };
        </script>
        <style>body { opacity: 0; }</style>
    </head>
    <body class="h-full" hx-boost="true" hx-ext="client-side-templates" hx-target="#app" hx-select="#app" hx-swap="outerHTML">
        <header class="fixed top-0 inset-x-0 h-14 px-6 border-b z-50 bg-slate-100">
            <div class="h-full flex gap-3 items-center">
                <h4 class="text-lg font-bold tracking-tight">
                    <a href="[[siteUrl]]">[[siteName]]</a>
                </h4>
            </div>
        </header>
        <main id="app" data-layout="base" class="p-6 pt-20 pb-20">[[app]]</main>
        <footer class="fixed bottom-0 inset-x-0 px-6 py-4 border-t bg-slate-200 z-50 pb-[calc(1rem+env(safe-area-inset-bottom))] flex items-center">
            <p class="text-xs text-slate-500">[[copyright]]</p>
        </footer>
        <modal></modal>
        <toast></toast>
        <confirm-dialog></confirm-dialog>
    </body>
</html>
